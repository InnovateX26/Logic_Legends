<!DOCTYPE html>
<html>
<head>
  <title>Login - SmartCare</title>

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .title {
      margin-bottom: 20px;
    }

  </style>
</head>

<body>

<div class="login-box">

  <h2 class="title">💙 SmartCare Login</h2>

  <input id="name" placeholder="Enter Name">
  <input id="age" type="number" placeholder="Enter Age">

  <select id="gender">
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>
      <br>           </br>
  <button onclick="login()">Login</button>

</div>

<script>

function login() {

  let name = document.getElementById("name").value;
  let age = document.getElementById("age").value;
  let gender = document.getElementById("gender").value;

  if (!name || !age) {
    alert("Please fill all details");
    return;
  }

  // SAVE DATA
  localStorage.setItem("userName", name);
  localStorage.setItem("age", age);
  localStorage.setItem("gender", gender);

  // REDIRECT
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
