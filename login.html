<!DOCTYPE html>
<html>
<head>
  <title>लॉगिन - स्मार्ट केयर</title>

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .title {
      margin-bottom: 20px;
    }

  </style>
</head>

<body>

<div class="login-box">

  <h2 class="title">💙 स्मार्ट केयर लॉगिन</h2>

  <input id="name" placeholder="अपना नाम लिखें">
  <input id="age" type="number" placeholder="अपनी उम्र लिखें">

  <select id="gender">
    <option>पुरुष</option>
    <option>महिला</option>
    <option>अन्य</option>
  </select>

  <button onclick="login()">लॉगिन करें</button>

</div>

<script>

function login() {

  let name = document.getElementById("name").value;
  let age = document.getElementById("age").value;
  let gender = document.getElementById("gender").value;

  if (!name || !age) {
    alert("कृपया सभी जानकारी भरें");
    return;
  }

  // डेटा सेव करें
  localStorage.setItem("userName", name);
  localStorage.setItem("age", age);
  localStorage.setItem("gender", gender);

  // डैशबोर्ड पर जाएं
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
